# ================================================
# Wiki Pipeline Configuration - Best Defaults
# Copy this file to .wiki-config.yml and customize
# ================================================

wiki:
  # The "Golden" output for the public branch
  wiki_dir: "wiki"

  # Consolidated directory for wiki internal processing
  wiki_state_dir: ".wiki"

  harvest_rglob_patterns:
    - "./*.md"
    - "**/docs/**/*.md"
    - "**/playbooks/**/*.md"
    - "**/roles/**/*.md"
    - "**/vars/**/*.md"

  harvest_ignore:
    - ".continue/"
    - "archive/"
    - "docs/"
    - "inventory/"
    - "molecule/"
    - "plugins/"
    - "save/"
    - "tests/"

  # skip during ingestion (test, deprecated, or very large roles)
  ingest_ignore:
    - "**/vars/vault.yml"
    - "**/vars/vaulted-credentials.yml"
    - "venv/"
    - "molecule/"
    - roles/bootstrap_cloudstack
    - roles/bootstrap_cloudstack_controller
    - roles/bootstrap_cobbler
    - roles/bootstrap_cobbler_resources
    - roles/bootstrap_netbootxyz
    - roles/bootstrap_samba_client
    - roles/bootstrap_zlib
    # Add any other roles you want ignored here

  # Top-level wiki index settings
  title: "Ansible Datacenter Wiki"
  subtitle: "Central documentation for all roles, playbooks, and infrastructure automation"
  description: |
    This wiki is automatically generated and maintained by the LLM-powered wiki pipeline.
    It provides professional, GitHub-native documentation for the ansible-datacenter repository.

  # Roles that should appear at the very top of the index (most important)
  # Add your top 20-50 most important roles here
  priority_roles:
    - apply_common_groups
    - apply_ping_test
    - bootstrap_ansible_controller
    - bootstrap_docker
    - bootstrap_docker_stack
    - bootstrap_gpu_drivers
    - bootstrap_jenkins_agent
    - bootstrap_kubernetes
    - bootstrap_kvm
    - bootstrap_linux
    - bootstrap_linux_core
    - bootstrap_linux_systemd
    - bootstrap_llm_host
    - bootstrap_netplan
    - bootstrap_pki
    - deploy_pki
    - deploy_vm

  # LLM settings (applied to all LLM calls: ingest, compile, lint, qa)
  llm:
    # Connection settings
    model: "qwen2.5-coder:32b"
    api_base: "http://gpu02.example.int:11434/v1"
    provider: "openai"
#    debug_llm: true

    # Generation settings
    # Lower = more consistent, higher = more creative
    temperature: 0.25
    max_tokens: 4096
    # 20. minutes (good for large roles)
    timeout: 1200

  # ================================================
  # Prompt Templates - Fully Customizable
  # ================================================

  role_prompt:
    prefix: |
      You are an expert Ansible architect and excellent technical writer.
      Create a **comprehensive, high-quality, professional documentation page** for this Ansible role.
    suffix: |
      Requirements:
      - Start with clean YAML frontmatter (title, role, category, type, tags)
      - One-paragraph summary of the role's purpose
      - Sections: Variables, Usage, Dependencies, Tags, Best Practices, Molecule Tests (if any)
      - Use the existing role's README.md if it exists to help derive role purpose and variable usage/purpose.
      - Include a '## Backlinks' section with relative links back to original role files.
        Note role source code back-references must derive the relative path to the role source directory.
        E.g.,
        Assuming the `wiki.output_dir` directory is set to the default then the role "apply_common_groups"
        `defaults/main.yml` reference should be "../../roles/apply_common_groups/defaults/main.yml".
      - Double-underscore variables (e.g. __internal_var) are internal role variables only. Never document them as user-configurable.
      - Do not invent "Related Roles" that do not exist in the repository.  Only include roles used in the source for the role.
      - Use only real relative links to files that actually exist.
      - Professional tone, clear headings, excellent readability.
      - Use only standard GitHub Markdown. No Obsidian syntax.

  compile_prompt:
    prefix: |
      You are an expert technical writer.
      Improve and standardize this documentation page for GitHub rendering.
      Keep all original information and meaning.
      Use clean, professional Markdown.
    suffix: |
      Add or improve YAML frontmatter (title, original_path, category, tags).
      Ensure clear structure, proper headings, and a "Backlinks" section if missing.
      Output only the improved Markdown.

  lint_prompt:
    prefix: |
      You are a strict technical documentation reviewer.
      Analyze this documentation page for quality, consistency, and completeness.
    suffix: |
      Return findings in this exact format only:
      ### {filename}
      **Issues:**
      - issue 1
      - issue 2
      **Suggestions:**
      - suggestion 1
      - suggestion 2

  qa_prompt: |
    You are a helpful technical support engineer for this Ansible datacenter repository.
    Generate 8-12 important, frequently asked Q&A pairs based on the content of this wiki.
    Focus on common user questions, troubleshooting steps, best practices, and gotchas.
    Format as a clean Q&A list using Markdown.

  # Group roles into logical categories (optional but recommended)
  categories:
    bootstrap:
      title: "Bootstrap & Foundation Roles"
      description: "Core OS and infrastructure setup"
      roles:
        - bootstrap_docker
        - bootstrap_linux_core
        - bootstrap_kubernetes
        - bootstrap_pki
        - bootstrap_netplan

    deployment:
      title: "Deployment & Provisioning"
      description: "VM, container, and application deployment"
      roles:
        - deploy_authorized_keys
        - deploy_ca_certs
        - deploy_pki_certs
        - deploy_vm

    networking:
      title: "Networking & Security"
      description: "Network configuration and hardening"
      roles:
        - apply_ping_test
        - bootstrap_linux_firewalld
        - bootstrap_linux_networking
        - bootstrap_netplan
        - bootstrap_network_interfaces
        - bootstrap_os_network
        - bootstrap_sshd
        - harden_os_linux
        - harden_os_windows

    monitoring:
      title: "Monitoring & Observability"
      description: "Telemetry, logging, and alerting"
      roles:
        - bootstrap_telegraf
        - bootstrap_postfix
        - run_inspec

    audit:
      title: "Audit & Information"
      description: "Roles run to audit and/or information gathering across inventory"
      roles:
        - fetch_linux_os_configs
        - report_inventory_facts

    operational:
      title: "Operational"
      description: "Roles run to operational plays (startup, shutdown, etc)"
      roles:
        - run_inspec
        - run_terraform
        - vmware_remount_datastores
        - vmware_upgrade_esxi

    utility:
      title: "Utility"
      description: "Roles run to perform and/or apply common tasks"
      roles:
        - apply_common_groups
        - apply_ping_test
        - fetch_os_images

  # Default category for any role not listed above
  default_category: "other"
  default_category_title: "Other Roles"
